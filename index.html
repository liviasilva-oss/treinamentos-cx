<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Treinamentos CX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Sora', sans-serif;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
      width: 320px;
    }

    h1 {
      margin-bottom: 10px;
      color: #0f172a;
    }

    p {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 30px;
    }

    .card {
      background: #0f172a;
      color: white;
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 15px;
      text-decoration: none;
      display: block;
      transition: 0.25s;
      border: 2px solid transparent;
    }

    .card:hover {
      background: white;
      color: #0f172a;
      border: 2px solid #d4a017;
      transform: translateY(-4px) scale(1.02);
    }

    .card span {
      display: block;
      font-size: 12px;
      opacity: 0.7;
    }

  </style>
</head>

<body>

  <div class="container">
    <h1>Treinamentos CX</h1>
    <p>Selecione um treinamento para iniciar</p>

    <a href="zendesk.html" class="card">
      Zendesk
      <span>Atendimento e gestão de tickets</span>
    </a>

    <a href="treinamento-totvs.html" class="card">
      TOTVS
      <span>Operação do sistema</span>
    </a>

  </div>

</body>
</html>
