<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Treinamentos CX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Sora', sans-serif;
      background: #f1f5f9; /* cinza claro */
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #0f172a; /* azul marinho */
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 40px;
      color: #0f172a; /* azul marinho */
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 260px;
      margin: 0 auto;
    }

    .btn {
      padding: 14px;
      border-radius: 10px;
      background: #0f172a; /* azul marinho */
      color: white;
      text-decoration: none;
      font-weight: 600;
      border: 2px solid transparent;
      transition: 0.25s;
    }

    .btn:hover {
      background: white;
      color: #0f172a;
      border: 2px solid #d4a017; /* amarelo mostarda */
      transform: translateY(-2px);
    }

  </style>
</head>

<body>

  <div class="container">
    <h1>Treinamentos CX</h1>

    <div class="buttons">
      <a href="zendesk.html" class="btn">Zendesk</a>
      <a href="treinamento-totvs.html" class="btn">TOTVS</a>
    </div>
  </div>

</body>
</html>
