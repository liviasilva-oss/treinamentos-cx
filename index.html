<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Treinamentos CX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Sora', sans-serif;
  background: #0f172a;
  color: white;
}

/* HEADER */
.header {
  padding: 20px 40px;
  font-size: 20px;
  font-weight: 600;
}

/* BANNER */
.banner {
  height: 300px;
  background: linear-gradient(to right, rgba(15,23,42,0.9), rgba(15,23,42,0.2)),
              url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d');
  background-size: cover;
  display: flex;
  align-items: center;
  padding: 40px;
}

.banner-content {
  max-width: 400px;
}

.banner h1 {
  margin: 0 0 10px;
}

.banner a {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 18px;
  background: #d4a017;
  color: #0f172a;
  text-decoration: none;
  border-radius: 6px;
  font-weight: 600;
}

/* SEÇÃO */
.section {
  padding: 20px 40px;
}

.section h2 {
  margin-bottom: 10px;
}

/* CARROSSEL */
.row {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding-bottom: 10px;
}

.row::-webkit-scrollbar {
  height: 6px;
}

.row::-webkit-scrollbar-thumb {
  background: #334155;
  border-radius: 4px;
}

/* CARD */
.card {
  min-width: 180px;
  height: 110px;
  background: #1e293b;
  border-radius: 10px;
  display: flex;
  align-items: flex-end;
  padding: 10px;
  transition: 0.25s;
  text-decoration: none;
  color: white;
}

.card:hover {
  transform: scale(1.08);
  background: #334155;
}

/* TEXTO */
.card span {
  font-size: 14px;
  font-weight: 600;
}

</style>
</head>

<body>

<div class="header">Treinamentos CX</div>

<!-- BANNER -->
<div class="banner">
  <div class="banner-content">
    <h1>Zendesk</h1>
    <p>Treinamento de atendimento e gestão de tickets</p>
    <a href="zendesk.html">Acessar treinamento</a>
  </div>
</div>

<!-- SEÇÃO -->
<div class="section">
  <h2>Treinamentos disponíveis</h2>

  <div class="row">

    <a href="zendesk.html" class="card">
      <span>Zendesk</span>
    </a>

    <a href="treinamento-totvs.html" class="card">
      <span>TOTVS</span>
    </a>

  </div>
</div>

</body>
</html>
