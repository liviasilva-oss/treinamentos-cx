<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Plataforma de Treinamentos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Sora', sans-serif;
      background: #f5f7fb;
      color: #1a202c;
    }

    .header {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      padding: 40px 20px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
    }

    .header p {
      margin-top: 10px;
      font-size: 14px;
      color: #cbd5f5;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .card strong {
      display: block;
      font-size: 16px;
      margin-bottom: 5px;
    }

    .card p {
      font-size: 13px;
      color: #5a6a80;
      margin: 0;
    }

    a {
      text-decoration: none;
      color: inherit;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <h1>Plataforma de Treinamentos</h1>
    <p>Escolha um treinamento para iniciar</p>
  </div>

  <!-- CONTEÚDO PRINCIPAL -->
  <div class="container">

    <h2>Treinamentos disponíveis</h2>

    <div class="grid">

      <!-- ZENDESK -->
      <a href="zendesk.html">
        <div class="card">
          <strong>Zendesk</strong>
          <p>POP-ATD-04 • Atendimento</p>
        </div>
      </a>

      <!-- TOTVS -->
      <a href="treinamento-totvs.html">
        <div class="card">
          <strong>TOTVS</strong>
          <p>Treinamento do sistema</p>
        </div>
      </a>

    </div>

  </div>

</body>
</html>
